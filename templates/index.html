<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление стереокамерой</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Управление панорамой и наклоном</h1>
        <div class="video">
            <img src="/video_feed" alt="Video Stream">
        </div>
        <div class="controls">
            <div>
                <label>Панорама: <span id="panVal">{{ pan }}</span>°</label>
                <input type="range" id="pan" min="30" max="150" value="{{ pan }}">
            </div>
            <div>
                <label>Наклон: <span id="tiltVal">{{ tilt }}</span>°</label>
                <input type="range" id="tilt" min="30" max="150" value="{{ tilt }}">
            </div>
        </div>
    </div>
    <script>
        const panSlider = document.getElementById('pan');
        const tiltSlider = document.getElementById('tilt');
        const panVal = document.getElementById('panVal');
        const tiltVal = document.getElementById('tiltVal');

        async function send(url) {
            try {
                await fetch(url);
            } catch(e) { console.error(e); }
        }

        panSlider.oninput = () => {
            let v = panSlider.value;
            panVal.innerText = v;
            send('/pan/' + v);
        };
        tiltSlider.oninput = () => {
            let v = tiltSlider.value;
            tiltVal.innerText = v;
            send('/tilt/' + v);
        };
    </script>
</body>
</html>
